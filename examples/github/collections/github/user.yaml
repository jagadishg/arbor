version: 1
kind: request
id: github.user
name: Get GitHub user
description: Look up a public GitHub account by username.
method: GET
url: "{{base_url}}/users/{{username}}"

headers:
  Accept: application/vnd.github+json

assert:
  - status == 200
  - body.login == "{{username}}"

extract:
  account_id: body.id
