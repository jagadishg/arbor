version: 1
kind: request
id: github.user-by-id
name: Get GitHub user by ID
description: Resolve a GitHub account by the numeric id extracted from github.user.
method: GET
url: "{{base_url}}/user/{{account_id}}"

headers:
  Accept: application/vnd.github+json

assert:
  - status == 200
  - body.login == "{{username}}"
