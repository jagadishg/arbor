version: 2

project_name: arbor

builds:
  - id: arbor
    main: ./cmd/arbor
    binary: arbor
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/jagadishg/arbor/internal/buildinfo.Version={{.Version}}
        -X github.com/jagadishg/arbor/internal/buildinfo.Commit={{.Commit}}
        -X github.com/jagadishg/arbor/internal/buildinfo.Date={{.Date}}

archives:
  - ids:
      - arbor
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: arbor
    binaries:
      - arbor
    repository:
      owner: jagadishg
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/jagadishg/arbor"
    description: "Terminal-native, local-first API workspace"
    url:
      verified: "github.com/jagadishg/arbor/"
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/arbor"]
          end
    skip_upload: auto

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  prerelease: auto
